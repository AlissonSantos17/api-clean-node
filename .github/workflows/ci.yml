name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack (Yarn version from packageManager)
        run: corepack enable

      - name: Cache Yarn Berry
        uses: actions/cache@v4
        with:
          path: ${{ runner.home }}/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Type check
        run: yarn tsc --noEmit

      - name: Build
        run: yarn build

      - name: Docker build
        run: docker build -t clean-node-api:ci .

      - name: Unit tests
        run: yarn test --passWithNoTests --silent --noStackTrace --runInBand -c jest-unit.config.ts --coverage

      - name: Integration tests
        run: yarn test --passWithNoTests --silent --noStackTrace --runInBand -c jest-integration.config.ts
